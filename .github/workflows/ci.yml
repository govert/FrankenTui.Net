name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone upstream reference workspace
        shell: bash
        run: |
          mkdir -p .external
          git clone https://github.com/Dicklesworthstone/frankentui.git .external/frankentui
          git -C .external/frankentui checkout 7a91089366bd4644e086d5a422cb76b052e3de17

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FrankenTui.Net.sln

      - name: Build
        run: dotnet build FrankenTui.Net.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FrankenTui.Net.sln --no-build --configuration Release

      - name: Refresh doctor artifacts
        if: runner.os == 'Linux'
        run: dotnet run --project tools/FrankenTui.Doctor/FrankenTui.Doctor.csproj --no-build --configuration Release -- --format text --write-artifacts --write-manifest --run-benchmarks --run-id ci-linux

      - name: Refresh doctor artifacts
        if: runner.os == 'Windows'
        run: dotnet run --project tools/FrankenTui.Doctor/FrankenTui.Doctor.csproj --no-build --configuration Release -- --format text --write-artifacts --run-id ci-windows

      - name: Capture Windows host evidence
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/replay | Out-Null
          New-Item -ItemType Directory -Force artifacts/doctor | Out-Null
          @(
            "runner_os=$env:RUNNER_OS"
            "term=$env:TERM"
            "wt_session=$env:WT_SESSION"
            "conemu_pid=$env:ConEmuPID"
            "conpty=$env:ConPty"
            "ps_module_path=$env:PSModulePath"
          ) | Set-Content artifacts/doctor/ci-windows-host-evidence.txt

          dotnet run --project tools/FrankenTui.Doctor/FrankenTui.Doctor.csproj --no-build --configuration Release -- --format json --run-id ci-windows `
            | Tee-Object -FilePath artifacts/doctor/ci-windows-doctor.json

          dotnet run --project apps/FrankenTui.Demo.Showcase/FrankenTui.Demo.Showcase.csproj --no-build --configuration Release -- --inline --width 72 --height 18 --frames 3 --scenario tooling `
            | Tee-Object -FilePath artifacts/replay/ci-windows-showcase-tooling-inline.txt

          dotnet run --project apps/FrankenTui.Demo.Showcase/FrankenTui.Demo.Showcase.csproj --no-build --configuration Release -- --inline --width 72 --height 18 --frames 3 --scenario extras `
            | Tee-Object -FilePath artifacts/replay/ci-windows-showcase-extras-inline.txt

      - name: Upload hosted artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: hosted-parity-artifacts
          path: |
            artifacts/doctor/
            artifacts/benchmarks/
            artifacts/replay/
            artifacts/web/

      - name: Upload Windows doctor artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-doctor-artifacts
          path: |
            artifacts/contracts/
            artifacts/doctor/
            artifacts/replay/
